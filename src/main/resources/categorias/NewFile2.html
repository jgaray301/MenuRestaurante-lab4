<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Nueva Comida</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>

<div class="container mt-4">

    <h2>Registrar Comida</h2>

    <form th:action="@{/comidas/guardar}"
          th:object="${comida}"
          method="post">

        <div class="mb-3">

            <label>Nombre</label>

            <input type="text"
                   class="form-control"
                   th:field="*{nombre}"
                   required>

        </div>

        <div class="mb-3">

            <label>Precio</label>

            <input type="number"
                   step="0.01"
                   class="form-control"
                   th:field="*{precio}"
                   required>

        </div>

        <div class="mb-3">

            <label>Categoría</label>

            <select class="form-select"
                    th:field="*{categoria}">

                <option th:each="cat : ${categorias}"
                        th:value="${cat.id}"
                        th:text="${cat.nombre}">
                </option>

            </select>

        </div>

        <button class="btn btn-success">
            Guardar
        </button>

        <a href="/comidas"
           class="btn btn-secondary">
           Regresar
        </a>

    </form>

</div>

</body>
</html>
