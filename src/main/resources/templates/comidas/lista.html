<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lista de Comidas</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
    <h2>📋 Lista de Comidas Registradas</h2>
    <div class="mb-3">
        <a th:href="@{/}" class="btn btn-secondary">🏠 Volver al Menú</a>
        <a th:href="@{/comidas/nuevo}" class="btn btn-primary">➕ Agregar Nueva Comida</a>
    </div>

    <table class="table table-striped table-bordered">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Precio</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="comida : ${comidas}">
                <td th:text="${comida.id}">1</td>
                <td th:text="${comida.nombre}">Ejemplo</td>
                <td th:text="${comida.precio}">0.00</td>
            </tr>
            <tr th:if="${comidas.isEmpty()}">
                <td colspan="3" class="text-center text-muted">No hay comidas registradas aún.</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
