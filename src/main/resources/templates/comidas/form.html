<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nueva Comida</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
    <h2>➕ Registrar Nueva Comida</h2>
    <form th:action="@{/comidas/guardar}" th:object="${comida}" method="post" class="col-md-6 mt-4">
        <div class="mb-3">
            <label class="form-label">Nombre de la Comida:</label>
            <input type="text" th:field="*{nombre}" class="form-control" required/>
        </div>
        <div class="mb-3">
            <label class="form-label">Precio ($):</label>
            <input type="number" step="0.01" th:field="*{precio}" class="form-control" required/>
        </div>
        <button type="submit" class="btn btn-success">Guardar Comida</button>
        <a th:href="@{/comidas}" class="btn btn-danger">Cancelar</a>
    </form>
</body>
</html>
